name: lifeforge

services:
  db:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    restart: unless-stopped
    environment:
      DOCKER_MODE: "true"
      PB_BINARY_PATH: /usr/local/bin/pocketbase
      PB_DIR: /pb_data
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY must be set in Dokploy}
      PB_EMAIL: ${PB_EMAIL:?PB_EMAIL must be set in Dokploy}
      PB_PASSWORD: ${PB_PASSWORD:?PB_PASSWORD must be set in Dokploy}
    expose:
      - "8090"
    volumes:
      - lifeforge_pb_data:/pb_data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8090/api/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-init:
    build:
      context: .
      dockerfile: docker/db-init/Dockerfile
    restart: "no"
    environment:
      DOCKER_MODE: "true"
      PB_DIR: /pb_data
      PB_HOST: http://0.0.0.0:8090
      PB_BINARY_PATH: /usr/local/bin/pocketbase
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY must be set in Dokploy}
      PB_EMAIL: ${PB_EMAIL:?PB_EMAIL must be set in Dokploy}
      PB_PASSWORD: ${PB_PASSWORD:?PB_PASSWORD must be set in Dokploy}
    volumes:
      - lifeforge_pb_data:/pb_data
      - ./modules:/app/modules
      - ./locales:/app/locales
    depends_on:
      db:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: docker/server/Dockerfile
    restart: unless-stopped
    environment:
      DOCKER_MODE: "true"
      NODE_ENV: production
      PB_HOST: http://db:8090
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY must be set in Dokploy}
      PB_EMAIL: ${PB_EMAIL:?PB_EMAIL must be set in Dokploy}
      PB_PASSWORD: ${PB_PASSWORD:?PB_PASSWORD must be set in Dokploy}
    expose:
      - "3636"
    volumes:
      - ./modules:/lifeforge/modules
      - ./locales:/lifeforge/locales
    depends_on:
      db-init:
        condition: service_completed_successfully

  client:
    build:
      context: .
      dockerfile: docker/client/Dockerfile
      args:
        VITE_API_HOST: /api
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      server:
        condition: service_started
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.lifeforge.rule=Host(`${LIFEFORGE_DOMAIN}`)"
      - "traefik.http.routers.lifeforge.entrypoints=websecure"
      - "traefik.http.routers.lifeforge.tls=true"
      - "traefik.http.routers.lifeforge.tls.certresolver=letsencrypt"
      - "traefik.http.services.lifeforge.loadbalancer.server.port=80"

networks:
  dokploy-network:
    external: true

volumes:
  lifeforge_pb_data:
